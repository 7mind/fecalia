# wanbond.example.toml — exhaustive annotated configuration reference.
#
# Every key wanbond reads is present here. Copy this file, fill the <placeholders>,
# and delete what you do not need:
#
#   sudo install -m 0600 /dev/null /etc/wanbond/edge.toml
#   $EDITOR /etc/wanbond/edge.toml     # paste + edit this content
#
# 0600 is MANDATORY: the file holds the WireGuard private key and the PSK, so
# config.Load refuses any file whose mode is not exactly 0600.
#
# This example is EDGE-oriented. For a CONCENTRATOR: set role = "concentrator",
# uncomment [wireguard].listen_port, and REMOVE the peer `endpoint`/`endpoints`
# (the concentrator learns the edge's endpoints from authenticated traffic).
#
# Required keys are shown live; optional keys are commented-out with their
# DEFAULT value (uncommenting one at its shown value is a no-op). Cross-field
# constraints a single example cannot express inline are listed at the bottom.
# Full prose reference: docs/install.md §3z. Everything here is enforced at
# config load (fail-fast on the first violation) except the loopback check and
# the allowed_ips non-empty check, noted below.

# ── top level ────────────────────────────────────────────────────────────────
role = "edge"                      # REQUIRED. "edge" | "concentrator". Never
                                   #   inferred from other keys.
psk  = "<base64 32-byte PSK>"      # REQUIRED. 32 raw bytes, base64. SAME value on
                                   #   both ends; keys the PSK-HMAC that
                                   #   authenticates outer PROBE/CONTROL frames.
                                   #   Generate: head -c 32 /dev/urandom | base64
# tun_persist = false              # OPTIONAL, DEFAULT false. When false the TUN
                                   #   wanbond0 is destroyed on daemon stop, so its
                                   #   addresses/routes/rules are dropped on every
                                   #   restart (today's teardown semantics). Set
                                   #   true and the daemon issues TUNSETPERSIST on
                                   #   start: wanbond0 SURVIVES a daemon restart
                                   #   with the SAME ifindex, so operator-owned
                                   #   addressing persists untouched. NOTE (D39): a
                                   #   persistent device STILL needs the
                                   #   NetworkManager unmanaged-devices drop-in on
                                   #   NM hosts — persistence keeps the link, it
                                   #   does not exempt it from NM.
# bind = "auto"                    # OPTIONAL, DEFAULT "auto". Top-level default
                                   #   bind mode, applied to every [[paths]] block
                                   #   that omits its own `bind` below. "source" |
                                   #   "device" | "auto" — see the per-path `bind`
                                   #   note below for what each value does. Exists
                                   #   for the VLAN-per-WAN policy-routing case;
                                   #   see docs/install.md §3b.

# ── paths: one [[paths]] block per WAN uplink; at least one is REQUIRED ───────
[[paths]]
name        = "starlink"           # REQUIRED. Stable, unique identifier.
source_addr = "192.168.1.10"       # REQUIRED. Bare local source IP the path's UDP
                                   #   socket binds to. Must be unique across paths
                                   #   (a shared source collides EADDRINUSE at the
                                   #   second bind). No default.
# bind = "auto"                    # OPTIONAL, DEFAULT the top-level default above
                                   #   (itself DEFAULT "auto" when that is also
                                   #   omitted). "source" forces the pre-T16
                                   #   source-IP pin unconditionally (defeats
                                   #   device-bind roam tolerance, but is the fix
                                   #   for a one-address-per-VLAN policy-routing
                                   #   edge — see docs/install.md §3b). "device"
                                   #   forces SO_BINDTODEVICE unconditionally.
                                   #   "auto" reproduces today's heuristic:
                                   #   device-bind only when provably equivalent
                                   #   to the source-IP pin, source-bind otherwise.
# dest_addr = "203.0.113.7:51820"  # OPTIONAL, edge-only meaning. Per-path
                                   #   concentrator endpoint (ip:port). Omit when
                                   #   one public IP fronts all uplinks (the peer's
                                   #   endpoint is reused). No default. Inert on the
                                   #   concentrator (it learns edge endpoints).
# link_bandwidth = "50Mbit"        # OPTIONAL. Operator-declared bottleneck
                                   #   bandwidth. SI bit/s: k/M/G = 1e3/1e6/1e9
                                   #   ("bit" may be written "bps"). Must be > 0.
                                   #   Used ONLY with scheduler.pacing_enabled
                                   #   (either policy); inert otherwise. No
                                   #   default (undeclared).
# link_rtt = "45ms"                # OPTIONAL. Operator-declared baseline RTT (Go
                                   #   duration). REQUIRED (> 0) when link_bandwidth
                                   #   is set with pacing enabled (either policy);
                                   #   else ignored.
# mtu = 1500                       # OPTIONAL, DEFAULT 0 (unset = AUTO-DISCOVER: the
                                   #   daemon PMTU-probes this path and sizes wanbond0
                                   #   to fit, re-probing on roam). Set it to PIN the
                                   #   path (skip discovery). Operator-declared OUTER
                                   #   path MTU in bytes — the underlay's IP-level MTU
                                   #   this path's datagrams must fit without
                                   #   fragmentation. When set, must be 1280..9000
                                   #   AND leave a derived inner (TUN) MTU >= 576
                                   #   after the fixed ~100-byte outer overhead
                                   #   (IP/UDP + outer DATA frame + WireGuard
                                   #   transport). Set this on any uplink whose real
                                   #   path MTU is BELOW 1500 (see the "5g" path
                                   #   below) — an over-declared MTU IP-fragments or
                                   #   PMTUD-blackholes, silently stalling the path.
# ride_through = "5s"              # OPTIONAL, DEFAULT 0. This path's liveness
                                   #   ride-through duration (Go duration string;
                                   #   D86). Starlink-primary pattern: tolerate a
                                   #   brief dish reboot/obstruction without
                                   #   flapping to the metered 5G standby. >= 0.
                                   #   THIS TASK (T203) ADDS THE CONFIG SURFACE
                                   #   ONLY — plumbing it into the running
                                   #   scheduler is a separate, later task; it does
                                   #   not yet change failover behavior.

# A second uplink (edge). Repeat the block per path.
[[paths]]
name        = "5g"
source_addr = "192.168.2.10"
mtu         = 1400                 # This carrier's cellular APN caps the path MTU
                                   #   below the 1500 Ethernet default — declare it
                                   #   so the tunnel never IP-fragments on this leg.
# ride_through is left UNSET (default 0) here — the 5G-standby-strict pattern:
# the standby should fail its own liveness immediately on loss, rather than
# riding through, so a real problem on the already-metered backup is not masked.

# ── wireguard: inner tunnel key material ─────────────────────────────────────
[wireguard]
private_key = "<base64 32-byte private key>"  # REQUIRED (both roles).
                                   #   Generate: wg genkey (public: … | wg pubkey)
# listen_port = 51820              # CONCENTRATOR-ONLY: REQUIRED (> 0) there; omit /
                                   #   leave 0 on the edge. uint16 (< 1024 needs
                                   #   CAP_NET_BIND_SERVICE).

# ── wireguard peers: at least one [[wireguard.peers]] is REQUIRED ─────────────
[[wireguard.peers]]
public_key = "<base64 peer public key>"  # REQUIRED. base64 32-byte key (the OTHER
                                   #   end's public key).
endpoint = "203.0.113.7:51820"     # EDGE: REQUIRED (this OR `endpoints`). ip:port
                                   #   literal (default) OR hostname with opt-in
                                   #   `dns = true` below. CONCENTRATOR: must be
                                   #   ABSENT (rejected) — it roams the edge
                                   #   dynamically. Mutually exclusive with
                                   #   `endpoints`.
# dns = false                       # OPTIONAL, DEFAULT false. Set true to enable
                                   #   hostname resolution for the endpoint above.
                                   #   The [dns] block below is OPTIONAL: it only
                                   #   selects the resolver TRANSPORT and defaults
                                   #   to the system resolver when absent.
# endpoints = ["203.0.113.7:51820", "198.51.100.7:51820"]
                                   # EDGE-ONLY ordered hub-failover list: [0] is the
                                   #   active concentrator, the rest ordered
                                   #   standbys. Each may be an ip:port literal
                                   #   (default) or a hostname with dns = true; when
                                   #   hostnames are used, each resolves to its full
                                   #   A+AAAA set and all addresses are ordered
                                   #   together in the failover list. duplicates
                                   #   rejected. Mutually exclusive with `endpoint`
                                   #   (its one-element form). Rejected on the
                                   #   concentrator.
allowed_ips = ["10.77.0.1/32"]     # REQUIRED: >= 1 CIDR routed to this peer
                                   #   (enforced when the WG UAPI is built). This is
                                   #   the peer's inner tunnel address(es). A literal
                                   #   0.0.0.0/0 or ::/0 (full tunnel) is ALWAYS split
                                   #   into the equivalent /1+/1 pair at UAPI render —
                                   #   the engine never sees the literal /0.
# mode = "default-route"           # OPTIONAL, edge-only. Marks this peer as an
                                   #   exit-capable full-tunnel concentrator (opts
                                   #   into a 0.0.0.0/0 / ::/0 allowed_ips entry
                                   #   above). Rejected on the concentrator.
                                   #   SEVERAL edge peers may carry the mode (T250
                                   #   multi-exit; the FIRST default-route peer in
                                   #   config order is the boot-default exit — see
                                   #   the MULTI-CONCENTRATOR EDGE example below).
                                   #   When set, the daemon installs the active
                                   #   exit peer's allowed_ips split (wg-quick
                                   #   /1+/1 for 0.0.0.0/0) as scope-link routes
                                   #   via wanbond0 once the interface is up, and
                                   #   removes them on stop. Routes ONLY — no
                                   #   policy routing, SNAT, or concentrator
                                   #   forwarding (those stay operator-owned).
# psk = "<base64 32-byte PSK>"      # OPTIONAL. Meaningful only with MORE THAN ONE
                                   #   peer — on EITHER role: a multi-peer
                                   #   concentrator (many edges, example below) or
                                   #   a multi-concentrator edge (T250, example
                                   #   below). With exactly one peer configured —
                                   #   as shown live here — a per-peer psk is
                                   #   REJECTED at load ("psk is not meaningful
                                   #   with a single peer"); leave it UNSET and the
                                   #   top-level `psk` above is used, so a legacy
                                   #   single-peer config is unaffected. With MORE
                                   #   THAN ONE peer, this field becomes REQUIRED
                                   #   and must be pairwise-distinct across peers:
                                   #   each peer authenticates its own PROBE frames
                                   #   with its OWN psk, and the top-level `psk`
                                   #   authenticates NO peer once a second peer is
                                   #   configured (T80/T81, Q21).
                                   #   Generate: head -c 32 /dev/urandom | base64
# name = "edge1"                    # OPTIONAL. Unused when a single peer is
                                   #   configured, as shown live here (metrics never
                                   #   carry a `peer` label for a single bound peer,
                                   #   see docs/runbook.md's "Multi-peer concentrator
                                   #   (G4)" metrics note). With MORE THAN ONE peer
                                   #   (either role — T250 edge included), REQUIRED
                                   #   and must be unique across peers
                                   #   (T80/T81, Q21). In multi-peer mode EVERY
                                   #   peer, including the first-configured peer,
                                   #   is exposed under this name as the metrics
                                   #   `peer` label (D58 fixed). A true single-peer
                                   #   exposition omits the label.

# ── second peer example (hostname endpoint with DNS opt-in) ──────────────────────
# [[wireguard.peers]]
# public_key = "<base64 peer public key>"
# endpoint = "concentrator.example.com:51820"  # hostname endpoint (requires dns = true)
# dns = true                        # enable hostname resolution for this endpoint
#                                   #   ([dns] block below is OPTIONAL — absent
#                                   #   means the system resolver; see [dns])
# allowed_ips = ["10.77.0.1/32"]

# ─────────────────────────────────────────────────────────────────────────────
# MULTI-PEER CONCENTRATOR EXAMPLE (G4): TWO EDGES, ONE CONCENTRATOR
# ─────────────────────────────────────────────────────────────────────────────
#
# The plural [[wireguard.peers]] syntax is supported on BOTH roles: on the
# concentrator (one block per edge, this example) and on the edge (one block
# per concentrator — the T250 multi-exit form, next example). The multi-peer
# name/psk rules below apply identically on either role. Single-peer configs
# (one [[wireguard.peers]] block, as shown live above) are unaffected: with
# exactly one peer, a per-peer `psk` is REJECTED at load (the top-level `psk`
# is used) and a per-peer `name` is optional and inert for metrics.
#
# With MORE THAN ONE peer, every peer authenticates its own PROBE frames with
# its OWN per-peer `psk` (internal/bind/multipath.go's peerBySource demux binds
# a source only once a PROBE MAC-verifies under that peer's psk); the
# top-level `psk` below remains REQUIRED by config validation but
# authenticates NO peer once a second peer is configured
# (internal/device/device.go feeds only per-peer PSKs to the bind — see
# docs/design.md's Security model). Each peer's `name` is REQUIRED and must be
# unique; once a second peer is configured EVERY bound peer — INCLUDING the
# first-configured/primary — is exposed under its configured `name` as the
# metrics `peer` label (D58 fixed). The empty label peer="" appears ONLY in a
# true single-peer exposition, which stays UNLABELED for byte-compatibility with
# the historical single-peer metrics.
#
# ── live example (two edges, distinct per-peer psk/name) ─────────────────────
# role = "concentrator"
# psk = "<base64 32-byte PSK>"      # REQUIRED by validate; authenticates no
                                   #   peer once a second peer is configured.
#
# [[paths]]
# name = "wan0"
# source_addr = "10.0.0.5"
#
# [wireguard]
# private_key = "<base64 32-byte private key>"
# listen_port = 51820
#
# # Edge 1: office — although bound first, its multi-peer metrics series carry
# # peer="office-edge"; peer="" is reserved for a true single-peer exposition.
# [[wireguard.peers]]
# public_key = "<base64 office-edge public key>"
# allowed_ips = ["10.77.1.0/24"]
# psk = "<base64 32-byte PSK for office-edge>"    # REQUIRED in multi-peer mode
# name = "office-edge"                             # REQUIRED in multi-peer mode
#
# # Edge 2: mobile — registered via AddConcentratorPeer, so its metrics
# # series carry peer="mobile-edge".
# [[wireguard.peers]]
# public_key = "<base64 mobile-edge public key>"
# allowed_ips = ["10.77.2.0/24"]
# psk = "<base64 32-byte PSK for mobile-edge>"    # Must differ from office-edge's psk
# name = "mobile-edge"                             # Must differ from office-edge's name
#
# [metrics]
# listen = "127.0.0.1:9090"

# ─────────────────────────────────────────────────────────────────────────────
# MULTI-CONCENTRATOR EDGE EXAMPLE (G28/T250): ONE EDGE, TWO EXIT CONCENTRATORS
# ─────────────────────────────────────────────────────────────────────────────
#
# The EDGE may declare several concentrator peers bonded over the SAME uplinks.
# Each mode = "default-route" peer is an exit-capable alternate for the
# full-tunnel egress; the FIRST default-route peer in config order is the
# boot-default exit (the selection never persists across restarts). Validation
# (see docs/install.md §Multi-concentrator edge): every exit-capable peer must
# list the SAME default-route entry set PLUS its own non-default inner
# allowed_ip (e.g. its inner /32 — a /0-only exit peer is rejected);
# non-default allowed_ips must not overlap across peers; each peer keeps its
# OWN endpoint/endpoints failover list, with exact duplicate literal endpoints
# across peers rejected; name/psk are required and pairwise-distinct as in any
# multi-peer config; ONE shared [scheduler]/[fec] policy block applies to every
# peer bond (no per-peer policy keys); and the probe fan-out (peers × uplinks,
# one liveness prober per pair) must stay within the 32-prober budget.
#
# ── live example (two uplinks × two concentrators = 4 probers) ────────────────
# role = "edge"
# psk = "<base64 32-byte PSK>"      # REQUIRED by validate; authenticates no
                                   #   peer once a second peer is configured.
#
# [[paths]]
# name = "starlink"
# source_addr = "192.168.1.10"
#
# [[paths]]
# name = "5g"
# source_addr = "192.168.2.10"
#
# [wireguard]
# private_key = "<base64 edge private key>"
#
# # Concentrator A — first default-route peer, so the boot-default exit.
# [[wireguard.peers]]
# public_key = "<base64 concentrator-A public key>"
# name = "hub-a"                                  # REQUIRED in multi-peer mode
# psk = "<base64 32-byte PSK for hub-a>"          # REQUIRED in multi-peer mode
# endpoint = "203.0.113.7:51820"                  # per-peer endpoint(s) required
# allowed_ips = ["0.0.0.0/0", "10.77.0.1/32"]     # same /0 set + its inner /32
# mode = "default-route"
#
# # Concentrator B — a warm-standby exit alternate.
# [[wireguard.peers]]
# public_key = "<base64 concentrator-B public key>"
# name = "hub-b"                                  # Must differ from hub-a's name
# psk = "<base64 32-byte PSK for hub-b>"          # Must differ from hub-a's psk
# endpoint = "198.51.100.7:51820"                 # Must differ from hub-a's endpoint
# allowed_ips = ["0.0.0.0/0", "10.77.0.2/32"]     # same /0 set + its OWN inner /32
# mode = "default-route"
#
# [metrics]
# listen = "127.0.0.1:9090"

# ── amnezia obfuscation: OPTIONAL, OFF by default (plain WireGuard) ───────────
# ALL-OR-NOTHING: either omit the whole block, or set the entire jc/jmin/jmax/s1/s2
# set — IDENTICALLY on both ends. One obfuscation engine per process.
# [amnezia]
# jc   = 4                         # junk packet count. > 0 when configured.
# jmin = 40                        # min junk packet size. > 0; jmin <= jmax.
# jmax = 70                        # max junk packet size. > 0.
# s1   = 30                        # init-packet junk prefix size. > 0.
# s2   = 40                        # response-packet junk prefix size. > 0.
                                   #   Constraint: (148 + s1) != (92 + s2) — the
                                   #   obfuscated init/response lengths must differ.
                                   #   (no defaults: required when the block present.)
                                   #   MTU: when this block is set, wanbond reserves
                                   #   max(s1, s2) bytes of junk-prefix headroom in the
                                   #   derived TUN MTU and in per-path PMTU discovery
                                   #   (D85), so a full-size obfuscated DATA packet still
                                   #   fits the path MTU. The larger s1/s2 is, the smaller
                                   #   the resulting inner (wanbond0) MTU.
# h1 = 1                           # magic header: initiation. Default 1..4 when the
# h2 = 2                           #   block is configured but NO header is given.
# h3 = 3                           #   When any is set, h1..h4 must be a DISTINCT set
# h4 = 4                           #   (values <= 4 mean "standard message type").

# ── scheduler: OPTIONAL. Omitted => active-backup, pacing off ─────────────────
# [scheduler]
# policy = "active-backup"         # "active-backup" (DEFAULT) | "weighted".
                                   #   pacing_enabled/per_path_capacity_fps/
                                   #   pacing_burst_frames below apply under
                                   #   EITHER policy (policy-independent
                                   #   pacing); engage_fraction..weight_loss_floor
                                   #   apply ONLY to "weighted" and stay
                                   #   inert/unset under active-backup.
# per_path_capacity_fps = 10000.0  # DEFAULT 10000. Weighted: aggregation-gate
                                   #   denominator and shared pacing refill rate.
                                   #   Active-backup: explicit per-path pacing
                                   #   refill rate (replicated across paths) when
                                   #   no link_bandwidth is declared. > 0 when set.
# engage_fraction    = 0.9         # DEFAULT 0.9. Weighted only. Engage
                                   #   aggregation above engage_fraction *
                                   #   capacity. In (0, 1].
# disengage_fraction = 0.5         # DEFAULT 0.5. Weighted only. Collapse below
                                   #   disengage_fraction * capacity. Must be in
                                   #   [0, engage_fraction) — the hysteresis band.
# collapse_dwell = "2s"            # DEFAULT 2s. Weighted only. Sustained-low
                                   #   dwell before collapsing to primary-only.
                                   #   >= 0.
# load_tau = "200ms"               # DEFAULT 200ms. Weighted only. Offered-load
                                   #   rate estimator time constant. > 0.
# pacing_enabled = false           # DEFAULT false. Turn on per-path send-pacing
                                   #   (token buckets) under EITHER policy. Off
                                   #   => buckets bypassed.
# pacing_burst_frames = 64.0       # DEFAULT 64. Token-bucket burst (frames),
                                   #   either policy. > 0 when pacing_enabled.
# weight_rtt_floor = "1ms"         # DEFAULT 1ms. RTT floor in the weight formula. >0.
# weight_loss_floor = 0.001        # DEFAULT 1e-3. Loss floor under the sqrt in the
                                   #   weight formula. > 0.

# ── fec: OPTIONAL, OFF by default (no parity on the wire) ─────────────────────
# [fec]
# enabled = true                   # DEFAULT false. Turns the FEC plane on; when
                                   #   false every field below is ignored.
# data_shards = 10                 # K: inner datagrams per coding group. >= 1 when
                                   #   enabled. No default (required).
# parity_shards = 6                # M: parity frames per group (and the adaptive
                                   #   parity CEILING). >= 1 when enabled; K + M <=
                                   #   256. No default (required).
# deadline = "5ms"                 # DEFAULT 5ms. Partial-group flush deadline. > 0
                                   #   and <= 125ms.
# adaptive = false                 # DEFAULT false. Closed-loop parity controller
                                   #   (parity tracks measured loss up to the
                                   #   ceiling). Requires enabled = true.
# target_residual = 0.005          # ADAPTIVE-ONLY, primary sizing surface:
                                   #   post-recovery residual-loss SLA in (0, 1). No
                                   #   default. Mutually exclusive with safety_factor.
# safety_factor = 1.5              # ADAPTIVE-ONLY, legacy headroom multiplier >= 1.
                                   #   DEFAULTS to 1.5 when adaptive and NEITHER field
                                   #   is set. Must stay 0 in fixed mode. Mutually
                                   #   exclusive with target_residual.

# ── liveness: OPTIONAL. Omitted => 1200ms down_after (today's fixed value) ────
# [liveness]
# down_after = "1200ms"            # DEFAULT 1200ms. Silence duration that marks
                                   #   an UP path DOWN (Go duration string; D86).
                                   #   FLOOR: must be >= 400ms (2x the fixed 200ms
                                   #   probe interval) — probe_interval itself is
                                   #   NOT configurable this pass, so a lower
                                   #   down_after makes the liveness detector's
                                   #   silence check outrun the echo cadence and
                                   #   permanently flap every path DOWN; rejected
                                   #   at load. No upper bound is REJECTED, but a
                                   #   down_after (+ largest path ride_through +
                                   #   2x200ms) exceeding the 3s transparent-
                                   #   failover deadline is WARN-and-allow: the
                                   #   daemon boots, logs one startup WARN, and
                                   #   sets wanbond_liveness_budget_sane = 0 (T211).

# ── dns: OPTIONAL. Omitted => system resolver, default cadence/timeouts ───────
# Selects the TRANSPORT a peer's opt-in hostname endpoint (dns = true, above)
# is resolved through. [dns] alone never turns hostname resolution on.
#
# EXAMPLE 1 (IP-literal DoH resolver):
# [dns]
# resolver = "doh"                 # "system" | "doh" | "dot"
# doh_url = "https://198.51.100.1/dns-query"  # REQUIRED iff resolver = "doh"
# poll_interval = "30s"            # OPTIONAL, DEFAULT 30s. Re-resolution cadence.
# timeout = "5s"                   # OPTIONAL, DEFAULT 5s. Per-lookup timeout.
#
# EXAMPLE 2 (hostname DoT resolver, requires bootstrap_ip):
# [dns]
# resolver = "dot"                 # "system" | "doh" | "dot"
# dot_server = "dns.example.com:853"  # REQUIRED iff resolver = "dot"
# bootstrap_ip = "198.51.100.2"    # REQUIRED: dot_server's host is a hostname
                                   #   (BOOTSTRAP-IP invariant: must reach the
                                   #   resolver WITHOUT DNS lookup itself).
# poll_interval = "30s"
# timeout = "5s"
#
# EXAMPLE 3 (system resolver, any IP-literal endpoint):
# [dns]
# resolver = "system"              # DEFAULT "system". No URL/server/bootstrap needed.
# poll_interval = "30s"
# timeout = "5s"
#
# Each EXAMPLE above is self-contained and independently valid: uncomment
# EXACTLY ONE (its [dns] header plus its fields) and nothing else. The three
# resolver modes are mutually exclusive — setting fields from more than one
# EXAMPLE at once (e.g. resolver = "doh" together with dot_server, or a
# bootstrap_ip on a doh_url/dot_server host that is already an IP literal) is
# rejected at config load. See internal/config/dns.go for every field's exact
# precondition.

# ── metrics: OPTIONAL. Omit the block => no /metrics endpoint is served ───────
[metrics]
listen = "127.0.0.1:9090"          # No default. LOOPBACK-ONLY (127.0.0.0/8, ::1, or
                                   #   a hostname resolving only to loopback); any
                                   #   other address is REFUSED when the endpoint
                                   #   binds (not at load).

# ── monitor: OPTIONAL. Omit the block => no monitoring-UI endpoint is served ──
# Read-only live-stats dashboard (per-peer throughput/loss/FEC sparklines) served
# over HTTP + a 1s-push WebSocket. Every request (including the /ws upgrade) is
# gated by unconditional Host + Origin validation (DNS-rebinding/CSRF defense);
# see docs/design.md §Security model for the full auth model and the accepted
# cleartext-token residual risk on a non-loopback bind.
# [monitor]
# listen = "127.0.0.1:9101"        # No default. Same loopback-only rule as
                                   #   metrics EXCEPT a non-loopback bind is
                                   #   ALLOWED when token (below) is set — a
                                   #   non-loopback listen WITHOUT a token fails
                                   #   fast at config load with
                                   #   ErrMonitorNonLoopbackWithoutAuth. Prefer
                                   #   `ssh -L 9101:127.0.0.1:9101 …` over
                                   #   opening this to the LAN (see design.md).
# token = "..."                    # OPTIONAL when listen is loopback; REQUIRED
                                   #   when listen is non-loopback. Presented
                                   #   once as `?token=...`, which sets a
                                   #   SameSite=Strict HttpOnly session cookie
                                   #   and redirects (302) to strip it from the
                                   #   URL. No TLS in v1: a non-loopback bind
                                   #   sends this token in CLEARTEXT over the
                                   #   LAN.
# reveal_addressing = false        # OPTIONAL, default false. A default-off
                                   #   opt-in that enables addressing disclosure
                                   #   on non-loopback binds. When set true,
                                   #   per-path source IPs, the concentrator's
                                   #   public endpoint, and hub addressing become
                                   #   visible to anyone holding the token. Token
                                   #   is still REQUIRED for non-loopback and
                                   #   this flag does NOT weaken the token gate.
                                   #   A loopback bind shows full addressing
                                   #   regardless; a config reload (SIGHUP) takes
                                   #   effect live.
#
# Addressing visibility: role/version/uptime, per-path bind mode/bound
# device/declared link bandwidth+RTT, and the truncated WG public-key
# fingerprint are shown on ANY binding. Per-path source/remote addressing and
# the hub-endpoint list's addresses (incl. a concentrator's connected-edge
# source addresses) are REDACTED SERVER-SIDE by default unless the monitor is
# ACTUALLY bound to loopback (verified against the kernel-bound address, not
# this `listen` string) OR the operator sets the default-off reveal_addressing
# opt-in; a token-authorized non-loopback bind still redacts addressing by
# default — the token authorizes the bind, not addressing disclosure, but the
# reveal_addressing flag is a separate, explicit opt-in for disclosure.

# ── log: OPTIONAL ────────────────────────────────────────────────────────────
[log]
level = "info"                     # DEFAULT "info" (empty => info). One of
                                   #   debug | info | warn | error ("warning"
                                   #   accepted for warn). Unknown => fail-fast.

# ── Cross-field constraints (not expressible inline) ─────────────────────────
# • Roles: `role` is required, never inferred. Edge-only: per-peer endpoint/
#   endpoints (required on edge, rejected on concentrator) + the pacing
#   declarations (dest_addr is edge-only in effect, merely inert on the
#   concentrator). Concentrator-only: wireguard.listen_port (required there).
# • endpoint vs endpoints: mutually exclusive; `endpoint` is the one-element form
#   of `endpoints`. On the edge exactly one must be present; the concentrator sets
#   neither. Each entry is an ip:port literal (default) or, with the peer's
#   `dns = true` opt-in, a hostname:port resolved at runtime (never at config
#   load). Duplicates are rejected within each form (literal-vs-literal,
#   hostname:port-vs-hostname:port) — a hostname is never compared against a
#   literal at load time.
# • Distinct source_addr: each [[paths]] needs a unique, valid source_addr
#   (compared unmapped, so 192.0.2.10 and ::ffff:192.0.2.10 collide). `name` must
#   also be unique.
# • allowed_ips: >= 1 CIDR per peer; empty is rejected when the WG config is
#   assembled (not by config.validate). Every entry's CIDR syntax IS parsed and
#   validated by config.validate (naming the peer + offending entry on a
#   malformed prefix), so a bad entry fails fast at load. A duplicate 0.0.0.0/0
#   or ::/0 entry WITHIN one peer's allowed_ips is rejected on either role. The
#   CROSS-peer default-route rules are role-split (T250):
#   - concentrator: a 0.0.0.0/0 / ::/0 entry may appear on at most ONE peer per
#     address family (overlapping allowed_ips is WireGuard cryptokey-routing
#     last-writer-wins; D59, unchanged);
#   - edge: a 0.0.0.0/0 / ::/0 entry is permitted ONLY on a
#     mode = "default-route" peer; multiple edge peers may carry the mode (each
#     an exit-capable alternate, first in config order = boot-default exit), in
#     which case every exit-capable peer must list the SAME default-route entry
#     set AND at least one non-default inner allowed_ip, and non-default
#     allowed_ips must not overlap across peers (see the MULTI-CONCENTRATOR
#     EDGE example above).
# • amnezia all-or-nothing: an unconfigured (all-zero) block is plain WireGuard.
#   Once ANY of jc/jmin/jmax/s1/s2/h1..h4 is set, the full jc,jmin,jmax,s1,s2 set
#   must be > 0, jmin <= jmax, 148+s1 != 92+s2, and h1..h4 must be a distinct set
#   (omitted headers default to 1..4). Same profile on both ends. One engine/process.
# • link_bandwidth + link_rtt are a pair: both-or-neither, and all-or-nothing
#   across every path (declare on every [[paths]] block or none; under weighted
#   the shared pace is sized to the slowest declared link, under active-backup
#   each path is sized from its own). They take effect with pacing_enabled = true
#   under EITHER scheduler.policy (pacing is policy-independent); otherwise a
#   declared bandwidth is inert. When active they are mutually exclusive with the
#   raw per_path_capacity_fps / pacing_burst_frames knobs.
# • scheduler off-unless-present: no [scheduler] => active-backup, pacing off,
#   every weighted-only knob ignored. Under weighted, the hysteresis band requires
#   disengage_fraction < engage_fraction.
# • fec off-unless-present: no [fec] (or enabled = false) => no parity. adaptive =
#   true requires enabled = true. In adaptive mode set EITHER target_residual OR
#   safety_factor, never both; both must stay 0 (unset) in fixed mode.
# • liveness off-unless-present: no [liveness] => down_after defaults to 1200ms
#   (today's fixed value), byte-identical to before this key existed. down_after
#   must be >= 400ms (2x the fixed, non-configurable 200ms probe interval) or
#   load is rejected; no upper bound is enforced (see [liveness] above). Per-path
#   ride_through (>= 0, DEFAULT 0) is a config-surface-only addition this pass —
#   it parses and validates but is not yet wired into failover behavior.
# • metrics loopback-only: listen must be a loopback address (or a hostname
#   resolving entirely to loopback); a non-loopback bind is refused when the
#   endpoint starts. Omit the block to serve no metrics.
# • monitor loopback-default: listen must be loopback UNLESS token is set, in
#   which case a non-loopback bind is allowed — an unauthenticated non-loopback
#   bind fails fast at config load (ErrMonitorNonLoopbackWithoutAuth). Omit the
#   block (or leave listen empty) to serve no monitoring UI. token is otherwise
#   optional. The dashboard is read-only EXCEPT for one loopback-only control:
#   POST /api/exit switches the active exit peer on a multi-exit edge, refused
#   with 403 on any non-loopback bind (regardless of token), so a remote monitor
#   stays strictly read-only even when authorized.
# • bind (top-level default + per-path override): "source" | "device" | "auto"
#   (DEFAULT). A [[paths]] block with no `bind` uses the top-level default
#   (itself DEFAULT "auto" when also omitted, so an existing config with no
#   `bind` anywhere is unaffected). "auto" reproduces today's selectDeviceBinds
#   heuristic; "source" and "device" force one behavior unconditionally. See
#   install.md §3b for the VLAN-per-WAN policy-routing case `bind = "source"`
#   exists to fix.
# • mtu (per-path, OPTIONAL): 0 (DEFAULT, unset) = AUTO-DISCOVER (the daemon
#   PMTU-probes the path and sizes wanbond0 to the min inner MTU across paths,
#   re-probing on roam). When set, PINS the path (no probing) and must be
#   1280..9000 and leave a derived inner MTU >= 576 after the fixed ~100-byte
#   outer overhead (IP/UDP + outer DATA frame + WireGuard transport). Declares
#   the path's OUTER underlay MTU; wanbond0's inner MTU is sized as the minimum
#   inner MTU across all paths (discovered or declared). See docs/p1-mtu.md.
# • dns off-unless-present: no [dns] => system resolver, default cadence/
#   timeouts; [dns] only selects the transport a peer's `dns = true` opt-in
#   uses, never a gate by itself. doh_url/dot_server are mode-specific: set
#   exactly the one matching `resolver`, the other (and bootstrap_ip under
#   resolver = "system") must stay absent. BOOTSTRAP-IP invariant: a
#   hostname-form doh_url/dot_server host REQUIRES bootstrap_ip; an IP
#   literal host REJECTS a non-empty bootstrap_ip (mode mismatch).
