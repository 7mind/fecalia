version: "2"

run:
  timeout: 5m

linters:
  # "standard" = errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - bodyclose
    - errorlint
    - misspell
    - unconvert
  exclusions:
    generated: lax
    rules:
      # Test files may ignore errors from setup helpers.
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
